name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Generate placeholder launcher icons if missing
      run: |
        for dir in app/src/main/res/mipmap-mdpi app/src/main/res/mipmap-hdpi app/src/main/res/mipmap-xhdpi app/src/main/res/mipmap-xxhdpi app/src/main/res/mipmap-xxxhdpi; do
          mkdir -p $dir
          if [ ! -f "$dir/ic_launcher.png" ]; then
            convert -size 192x192 xc:#6366f1 -fill white -font DejaVu-Sans -pointsize 80 -gravity center -annotate 0 'W' "$dir/ic_launcher.png" 2>/dev/null || \
            python3 -c "import struct,zlib; data=struct.pack('>IHHI',1,192,192,0); open('$dir/ic_launcher.png','wb').write(b'\x89PNG\r\n\x1a\n'+struct.pack('>I',13)+b'IHDR'+struct.pack('>IIBBBBB',192,192,8,2,0,0,0)+struct.pack('>I',zlib.crc32(b'IHDR'+struct.pack('>IIBBBBB',192,192,8,2,0,0,0))&0xffffffff)+b'\x00'*100)"
            cp "$dir/ic_launcher.png" "$dir/ic_launcher_round.png" 2>/dev/null || true
          fi
        done

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.11.1'

    - name: Build Debug APK
      run: gradle assembleDebug --no-daemon

    - name: Build Release AAB (for Play Store)
      run: gradle bundleRelease --no-daemon
      continue-on-error: true

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload Release AAB
      uses: actions/upload-artifact@v4
      if: success()
      continue-on-error: true
      with:
        name: release-aab
        path: app/build/outputs/bundle/release/*.aab

    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: success()
      with:
        tag_name: build-${{ github.run_number }}
        name: Build #${{ github.run_number }}
        files: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/bundle/release/*.aab
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
